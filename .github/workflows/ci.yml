name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run Django migrations and tests
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install backend requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Start backend server
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py seed_demo_data
          nohup python manage.py runserver 0.0.0.0:8000 > ../backend.log 2>&1 &
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps
      - name: Start frontend server and run Playwright tests
        working-directory: frontend
        run: |
          nohup npm run dev -- --hostname 0.0.0.0 --port 3000 > ../frontend.log 2>&1 &
          for i in {1..60}; do curl -fsS http://localhost:8000/api/scenarios/ && break; sleep 2; done
          for i in {1..90}; do curl -fsS http://localhost:3000 && break; sleep 2; done
          APP_URL=http://localhost:3000 npm run test:e2e
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-server-logs
          path: |
            backend.log
            frontend.log
